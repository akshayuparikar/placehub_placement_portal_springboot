<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><title>Students - PlaceHub Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f4f8;display:flex;min-height:100vh}
.sidebar{width:220px;background:#1e293b;color:#fff;flex-shrink:0;position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;overflow-y:auto}
.brand{padding:18px 16px;font-size:18px;font-weight:700;color:#60a5fa;border-bottom:1px solid #334155}
.nav{flex:1;padding:12px 8px}
.nav a{display:block;padding:9px 12px;color:#94a3b8;text-decoration:none;border-radius:6px;font-size:13px;margin-bottom:2px}
.nav a:hover,.nav a.active{background:#334155;color:#fff}
.nav-section{padding:12px 12px 4px;font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:.8px}
.sidebar-foot{padding:12px;border-top:1px solid #334155}
.user-info{padding:8px 12px;background:#0f172a;border-radius:6px;margin-bottom:8px;font-size:12px;color:#94a3b8}
.user-name{font-weight:700;color:#e2e8f0;font-size:13px}
.logout{display:block;width:100%;padding:9px;background:#ef4444;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;text-align:center;text-decoration:none}
.logout:hover{background:#dc2626}
.main{margin-left:220px;flex:1;display:flex;flex-direction:column}
.topbar{background:#fff;padding:14px 24px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar h1{font-size:17px;font-weight:700;color:#1e293b}
.content{padding:24px;flex:1}
.card{background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);padding:20px;margin-bottom:18px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:15px;font-weight:700;color:#1e293b}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f8fafc;padding:9px 12px;text-align:left;color:#64748b;font-size:11px;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid #e2e8f0}
td{padding:10px 12px;border-bottom:1px solid #f1f5f9;color:#374151;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.badge{display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700}
.b-green{background:#dcfce7;color:#166534}
.b-yellow{background:#fef9c3;color:#713f12}
.b-gray{background:#f1f5f9;color:#475569}
.btn{display:inline-block;padding:7px 14px;border-radius:6px;font-size:12px;font-weight:700;border:none;cursor:pointer;text-decoration:none}
.btn-primary{background:#2563eb;color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-outline{background:#fff;color:#374151;border:1px solid #d1d5db}
.btn-outline:hover{background:#f8fafc}
.btn-sm{padding:5px 10px;font-size:11px}
input{padding:8px 11px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;outline:none}
input:focus{border-color:#2563eb}
</style>
</head>
<body>
<div class="sidebar">
  <div class="brand">🎓 PlaceHub</div>
  <div class="nav">
    <div class="nav-section">Admin Panel</div>
    <a href="/admin/dashboard">📊 Dashboard</a>
    <a href="/admin/students" class="active">👨‍🎓 Students</a>
    <a href="/admin/companies">🏢 Companies</a>
    <a href="/admin/jobs">💼 Job Postings</a>
    <a href="/admin/placements">🏆 Placements</a>
  </div>
  <div class="sidebar-foot">
    <div class="user-info"><div class="user-name">Admin</div><div>Administrator</div></div>
    <a href="/auth/logout" class="logout">Logout</a>
  </div>
</div>
<div class="main">
  <div class="topbar"><h1>Student Management</h1></div>
  <div class="content">
    <div class="card" style="margin-bottom:18px">
      <form method="get" action="/admin/students" style="display:flex;gap:10px;align-items:flex-end">
        <div>
          <label style="display:block;font-size:11px;font-weight:700;color:#374151;margin-bottom:4px;text-transform:uppercase">Filter by Department</label>
          <input type="text" name="dept" th:value="${dept}" placeholder="e.g. Computer Science">
        </div>
        <button type="submit" class="btn btn-primary">Filter</button>
        <a href="/admin/students" class="btn btn-outline">Clear</a>
      </form>
    </div>
    <div class="card">
      <div class="card-header">
        <span class="card-title">All Students (<span th:text="${#lists.size(students)}">0</span>)</span>
      </div>
      <table>
        <thead>
          <tr><th>Student</th><th>Roll No</th><th>Dept / Batch</th><th>CGPA</th><th>Backlogs</th><th>10th%</th><th>12th%</th><th>Status</th><th>Placed At</th></tr>
        </thead>
        <tbody>
          <tr th:each="s : ${students}">
            <td>
              <div style="font-weight:600" th:text="${s.user.name}">Name</div>
              <div style="font-size:11px;color:#94a3b8" th:text="${s.user.email}">email</div>
              <div style="font-size:11px;color:#94a3b8" th:text="${s.phone}">phone</div>
            </td>
            <td style="font-weight:600" th:text="${s.rollNumber}">-</td>
            <td>
              <div th:text="${s.department}">-</div>
              <div style="font-size:11px;color:#94a3b8" th:text="${s.batch}">-</div>
            </td>
            <td>
              <span style="font-weight:700"
                th:style="${(s.cgpa != null and s.cgpa >= 8.0)} ? 'color:#16a34a' : ((s.cgpa != null and s.cgpa >= 6.0) ? 'color:#f59e0b' : 'color:#dc2626')"
                th:text="${s.cgpa}">-</span>
            </td>
            <td th:text="${s.backlogs}">0</td>
            <td th:text="${s.tenthPercentage != null ? s.tenthPercentage + '%' : '-'}">-</td>
            <td th:text="${s.twelfthPercentage != null ? s.twelfthPercentage + '%' : '-'}">-</td>
            <td>
              <span class="badge"
                th:classappend="${s.placementStatus.name() == 'PLACED'} ? 'b-green' : 'b-yellow'"
                th:text="${s.placementStatus.name().replace('_',' ')}">-</span>
            </td>
            <td style="font-size:12px;color:#16a34a;font-weight:600"
                th:text="${s.placedCompany != null ? s.placedCompany : '-'}">-</td>
          </tr>
          <tr th:if="${#lists.isEmpty(students)}">
            <td colspan="9" style="text-align:center;color:#94a3b8;padding:32px">No students found.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</body>
</html>
