<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><title>Error - PlaceHub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f4f8;min-height:100vh;display:flex;align-items:center;justify-content:center}
.box{background:#fff;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.12);max-width:480px;width:100%;padding:40px;text-align:center}
.icon{font-size:52px;margin-bottom:16px}
h1{font-size:22px;font-weight:700;color:#1e293b;margin-bottom:10px}
p{color:#64748b;font-size:14px;margin-bottom:20px}
.err-msg{background:#fee2e2;border:1px solid #fca5a5;color:#991b1b;border-radius:6px;padding:12px;font-size:13px;margin-bottom:20px;text-align:left;word-break:break-word}
a{display:inline-block;padding:10px 24px;background:#2563eb;color:#fff;border-radius:6px;text-decoration:none;font-weight:700;font-size:14px}
a:hover{background:#1d4ed8}
</style>
</head>
<body>
<div class="box">
  <div class="icon">⚠️</div>
  <h1>Something Went Wrong</h1>
  <p>An unexpected error occurred. Please try again.</p>
  <div class="err-msg" th:if="${error}" th:text="${error}">Error details here</div>
  <a href="/">← Back to Home</a>
</div>
</body>
</html>
