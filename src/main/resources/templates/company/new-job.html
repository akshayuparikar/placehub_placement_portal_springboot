<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><title>Post New Job - PlaceHub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f4f8;display:flex;min-height:100vh}
.sidebar{width:220px;background:#1e293b;color:#fff;flex-shrink:0;position:fixed;top:0;left:0;bottom:0;display:flex;flex-direction:column;overflow-y:auto}
.brand{padding:18px 16px;font-size:18px;font-weight:700;color:#60a5fa;border-bottom:1px solid #334155}
.nav{flex:1;padding:12px 8px}
.nav a{display:block;padding:9px 12px;color:#94a3b8;text-decoration:none;border-radius:6px;font-size:13px;margin-bottom:2px}
.nav a:hover,.nav a.active{background:#334155;color:#fff}
.nav-section{padding:12px 12px 4px;font-size:10px;color:#475569;text-transform:uppercase;letter-spacing:.8px}
.sidebar-foot{padding:12px;border-top:1px solid #334155}
.user-info{padding:8px 12px;background:#0f172a;border-radius:6px;margin-bottom:8px;font-size:12px;color:#94a3b8}
.user-name{font-weight:700;color:#e2e8f0;font-size:13px}
.logout{display:block;width:100%;padding:9px;background:#ef4444;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;text-align:center;text-decoration:none}
.logout:hover{background:#dc2626}
.main{margin-left:220px;flex:1;display:flex;flex-direction:column}
.topbar{background:#fff;padding:14px 24px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar h1{font-size:17px;font-weight:700;color:#1e293b}
.content{padding:24px;flex:1}
.card{background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.08);padding:24px;max-width:700px}
.card-title{font-size:15px;font-weight:700;color:#1e293b;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid #f1f5f9}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grp{margin-bottom:14px}
.full{grid-column:1/-1}
label{display:block;font-size:11px;font-weight:700;color:#374151;margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
input,select,textarea{width:100%;padding:9px 11px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;outline:none;font-family:Arial,sans-serif}
input:focus,select:focus,textarea:focus{border-color:#2563eb;box-shadow:0 0 0 2px rgba(37,99,235,.1)}
textarea{resize:vertical;height:100px}
.hint{font-size:11px;color:#94a3b8;margin-top:3px}
.btn{display:inline-block;padding:9px 20px;border-radius:6px;font-size:13px;font-weight:700;border:none;cursor:pointer;text-decoration:none}
.btn-primary{background:#2563eb;color:#fff}
.btn-primary:hover{background:#1d4ed8}
.btn-outline{background:#fff;color:#374151;border:1px solid #d1d5db;margin-left:8px}
.btn-outline:hover{background:#f8fafc}
</style>
</head>
<body>
<div class="sidebar">
  <div class="brand">🎓 PlaceHub</div>
  <div class="nav">
    <div class="nav-section">Company Menu</div>
    <a href="/company/dashboard">📊 Dashboard</a>
    <a href="/company/jobs">💼 My Job Posts</a>
    <a href="/company/jobs/new" class="active">➕ Post New Job</a>
    <a href="/company/profile">🏢 Company Profile</a>
  </div>
  <div class="sidebar-foot">
    <div class="user-info">
      <div class="user-name" th:text="${company.companyName}">Company</div>
      <div th:text="${company.industry != null ? company.industry : 'Company'}">Industry</div>
    </div>
    <a href="/auth/logout" class="logout">Logout</a>
  </div>
</div>
<div class="main">
  <div class="topbar">
    <h1>Post New Job</h1>
    <a href="/company/jobs" class="btn btn-outline" style="padding:6px 14px;font-size:12px">← Back</a>
  </div>
  <div class="content">
    <div class="card">
      <div class="card-title">Job Details</div>
      <form action="/company/jobs/new" method="post">
        <div class="grid2">
          <div class="grp full">
            <label>Job Title *</label>
            <input type="text" name="title" placeholder="e.g. Software Engineer - Java" required>
          </div>
          <div class="grp">
            <label>Job Type *</label>
            <select name="jobType" required>
              <option value="">Select type...</option>
              <option value="FULL_TIME">Full Time</option>
              <option value="INTERNSHIP">Internship</option>
              <option value="PART_TIME">Part Time</option>
              <option value="CONTRACT">Contract</option>
            </select>
          </div>
          <div class="grp">
            <label>Location</label>
            <input type="text" name="location" placeholder="e.g. Bangalore, Karnataka">
          </div>
          <div class="grp">
            <label>Package (LPA) *</label>
            <input type="number" name="packageLpa" step="0.5" min="0" placeholder="e.g. 8.5" required>
          </div>
          <div class="grp">
            <label>Minimum CGPA *</label>
            <input type="number" name="minCgpa" step="0.1" min="0" max="10" placeholder="e.g. 7.0" required>
          </div>
          <div class="grp">
            <label>Max Allowed Backlogs</label>
            <input type="number" name="maxBacklogs" min="0" value="0">
          </div>
          <div class="grp">
            <label>Application Deadline *</label>
            <input type="date" name="applicationDeadline" required>
          </div>
          <div class="grp">
            <label>Drive / Interview Date</label>
            <input type="date" name="driveDate">
          </div>
          <div class="grp full">
            <label>Eligible Departments</label>
            <input type="text" name="eligibleDepartments" placeholder="e.g. Computer Science,Information Technology,Electronics">
            <div class="hint">Comma-separated list of eligible departments</div>
          </div>
          <div class="grp full">
            <label>Job Description *</label>
            <textarea name="description" placeholder="Describe the role, responsibilities, requirements..." required></textarea>
          </div>
        </div>
        <div style="margin-top:8px">
          <button type="submit" class="btn btn-primary">Post Job</button>
          <a href="/company/jobs" class="btn btn-outline">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
</body>
</html>
